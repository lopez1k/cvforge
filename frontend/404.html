<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVForge — Резюме не знайдено</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/404.css">
</head>
<body>

  <div class="window-chrome">
    <div class="window-titlebar">
      <div class="window-dots"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span></div>
      <div class="window-tab">404 · not_found.json</div>
    </div>

    <div class="body-content">
      <p class="error-code">// помилка 404</p>
      <div class="error-icon">🔒</div>
      <h1>Резюме не знайдено</h1>
      <p class="error-message">
        Це посилання не веде на жодне публічне резюме.
      </p>

      <div class="reasons">
        <p>Можливі причини</p>
        <ul>
          <li>Посилання введено неправильно або застаріло</li>
          <li>Власник вимкнув публічний доступ до цього резюме</li>
          <li>Резюме було видалено</li>
        </ul>
      </div>

      <div class="actions">
        <a href="/" class="btn btn-accent">Створити своє резюме на CVForge</a>
      </div>
    </div>
  </div>

</body>
</html>
